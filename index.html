<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedidos — Liga de Data Science</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1D9E75;
      --green-light: #E1F5EE;
      --green-dark: #085041;
      --green-mid: #0F6E56;
      --blue-light: #E6F1FB;
      --blue-dark: #0C447C;
      --amber-light: #FAEEDA;
      --amber-dark: #633806;
      --gray-light: #F1EFE8;
      --gray-dark: #444441;
      --radius-md: 8px;
      --radius-lg: 12px;
      --border: 0.5px solid #e0e0e0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 0.5px solid #e0e0e0;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 { font-size: 16px; font-weight: 500; color: #1a1a1a; }
    header span { font-size: 13px; color: #888; }

    .container { max-width: 520px; margin: 0 auto; padding: 16px; }

    .tabs {
      display: flex;
      background: #fff;
      border-radius: var(--radius-lg);
      border: var(--border);
      padding: 4px;
      margin-bottom: 16px;
      gap: 4px;
    }
    .tab {
      flex: 1;
      padding: 9px 6px;
      border-radius: var(--radius-md);
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      color: #888;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.15s;
    }
    .tab.active { background: var(--green-light); color: var(--green-dark); font-weight: 500; }
    .tab i { font-size: 16px; }

    .panel { display: none; }
    .panel.active { display: block; }

    .card {
      background: #fff;
      border: var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 12px;
    }

    .section-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 13px; color: #666; }
    input, select, textarea {
      width: 100%;
      padding: 9px 12px;
      border: 0.5px solid #ddd;
      border-radius: var(--radius-md);
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--green); }
    textarea { resize: vertical; min-height: 60px; }

    .produtos { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .produto-btn {
      padding: 12px 10px;
      border-radius: var(--radius-md);
      border: 0.5px solid #e0e0e0;
      background: #fafaf8;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
    }
    .produto-btn:hover { border-color: #bbb; }
    .produto-btn.selected { border: 2px solid var(--green); background: var(--green-light); }
    .produto-btn .p-nome { font-size: 13px; font-weight: 500; color: #1a1a1a; line-height: 1.3; }
    .produto-btn .p-preco { font-size: 12px; color: #888; margin-top: 3px; }
    .produto-btn .p-tag { font-size: 11px; margin-top: 5px; padding: 2px 7px; border-radius: 99px; display: inline-block; }
    .produto-btn.selected .p-nome { color: var(--green-dark); }
    .produto-btn.selected .p-preco { color: var(--green-mid); }
    .tag-queijo { background: var(--amber-light); color: var(--amber-dark); }
    .tag-semqueijo { background: var(--gray-light); color: var(--gray-dark); }
    .tag-vegano { background: var(--green-light); color: var(--green-dark); }

    .qty-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .qty-label { font-size: 14px; color: #666; }
    .qty-controls { display: flex; align-items: center; gap: 12px; }
    .qty-btn {
      width: 34px; height: 34px;
      border-radius: var(--radius-md);
      border: 0.5px solid #ddd;
      background: #fff;
      cursor: pointer;
      font-size: 20px;
      color: #1a1a1a;
      display: flex; align-items: center; justify-content: center;
    }
    .qty-val { font-size: 18px; font-weight: 500; min-width: 20px; text-align: center; }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-top: 0.5px solid #eee;
    }
    .total-label { font-size: 14px; color: #666; }
    .total-val { font-size: 22px; font-weight: 500; color: #1a1a1a; }

    .btn-primary {
      width: 100%;
      padding: 13px;
      border-radius: var(--radius-md);
      border: none;
      background: var(--green);
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

    .filtro-wrap { margin-bottom: 12px; }

    .pedido-card {
      background: #fff;
      border: var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .pedido-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .pedido-nome { font-weight: 500; font-size: 15px; color: #1a1a1a; }
    .pedido-tel { font-size: 13px; color: #888; margin-top: 2px; }
    .pedido-info { font-size: 13px; color: #666; margin-top: 7px; line-height: 1.5; }
    .pedido-obs { font-size: 12px; color: #888; margin-top: 4px; font-style: italic; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
    }
    .badge-aguardando { background: var(--amber-light); color: var(--amber-dark); }
    .badge-preparo { background: var(--blue-light); color: var(--blue-dark); }
    .badge-pronto { background: var(--green-light); color: var(--green-dark); }
    .badge-entregue { background: #f0f0ec; color: #888; }

    .status-btns { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .status-btn {
      padding: 7px 14px;
      border-radius: var(--radius-md);
      border: 0.5px solid #ddd;
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      color: #666;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .status-btn.preparo   { border-color: #85B7EB; color: var(--blue-dark); }
    .status-btn.pronto    { border-color: #97C459; color: var(--green-dark); background: var(--green-light); }
    .status-btn.entregue  { border-color: #ccc; color: #888; background: #f0f0ec; }

    .msg-enviada { font-size: 12px; color: var(--green-mid); margin-top: 8px; display: flex; align-items: center; gap: 4px; }

    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: #bbb;
      font-size: 14px;
    }
    .empty i { font-size: 36px; display: block; margin: 0 auto 10px; }

    .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
    .metric { background: #fff; border: var(--border); border-radius: var(--radius-md); padding: 14px; }
    .metric-label { font-size: 11px; color: #999; margin-bottom: 5px; }
    .metric-val { font-size: 22px; font-weight: 500; color: #1a1a1a; }

    .rel-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 0.5px solid #eee;
      font-size: 14px;
    }
    .rel-item:last-child { border-bottom: none; }
    .rel-item-nome { color: #1a1a1a; }
    .rel-item-val { color: #888; }
    .rel-item-val strong { color: #1a1a1a; }

    .btn-secondary {
      width: 100%;
      padding: 11px;
      border-radius: var(--radius-md);
      border: 0.5px solid #ddd;
      background: transparent;
      cursor: pointer;
      font-size: 14px;
      color: #666;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 10px;
    }
    .btn-secondary:hover { background: #fafaf8; }

    .pagamento-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
    .pagamento-btn {
      padding: 10px 8px;
      border-radius: var(--radius-md);
      border: 0.5px solid #e0e0e0;
      background: #fafaf8;
      cursor: pointer;
      text-align: center;
      font-size: 13px;
      color: #666;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: all 0.15s;
    }
    .pagamento-btn i { font-size: 18px; }
    .pagamento-btn:hover { border-color: #bbb; }
    .pagamento-btn.selected { border: 2px solid var(--green); background: var(--green-light); color: var(--green-dark); font-weight: 500; }

    .badge-pagamento {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 500;
      background: var(--gray-light);
      color: var(--gray-dark);
      margin-left: 6px;
    }

    .rel-pag-bar {
      height: 6px;
      border-radius: 99px;
      margin-top: 6px;
      background: var(--green);
      transition: width 0.3s;
    }

    .tab-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 99px;
      background: #e74c3c;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      color: #fff;
      padding: 10px 20px;
      border-radius: 99px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 400px) {
      .produtos { grid-template-columns: 1fr 1fr; }
      .metrics { grid-template-columns: 1fr 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body style="font-size:35px;">

<header style="background:#000000; color:#ffffff;">
  <i class="ti ti-building-store" style="font-size:20px; color:#FFD700; border:1px solid #000000; margin:2px;"></i>
  <div style="line-height:1.1;">
    <h1 style="font-size:20px; color:#ffffff;">Liga de Data Science</h1>
    <span style="color:#ffffff;">Controle de pedidos</span>
  </div>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="showTab('caixa')">
      <i class="ti ti-shopping-cart"></i> Caixa
    </button>
    <button class="tab" onclick="showTab('cozinha')">
      <i class="ti ti-chef-hat"></i> Cozinha <span id="badge-pendentes" class="tab-badge" style="display:none;"></span>
    </button>
    <button class="tab" onclick="showTab('relatorio')">
      <i class="ti ti-chart-bar"></i> Relatório
    </button>
  </div>

  <!-- CAIXA -->
  <div id="tab-caixa" class="panel active">
    <div class="card">
      <div class="section-label">Dados do cliente</div>
      <div class="form-row">
        <div class="form-group">
          <label>Nome</label>
          <input type="text" id="cliente-nome" placeholder="Ex: Ana Clara" autocomplete="off" />
        </div>
        <div class="form-group">
          <label>WhatsApp (com DDD)</label>
          <input type="tel" id="cliente-tel" placeholder="34 99999-0000" />
        </div>
      </div>
      <div class="form-group" style="margin-bottom:12px;">
        <label>Vendedor (opcional)</label>
        <input type="text" id="cliente-vendedor" placeholder="Ex: João" autocomplete="off" />
      </div>
      <div class="form-group">
        <label>Observação (opcional)</label>
        <textarea id="cliente-obs" placeholder="Ex: sem cebola, alergia a glúten..."></textarea>
      </div>
      <div class="form-group" style="margin-top:12px;">
        <label>Forma de pagamento</label>
        <div class="pagamento-btns">
          <button type="button" class="pagamento-btn" onclick="selecionarPagamento('pix', this)">
            <i class="ti ti-qrcode"></i> Pix
          </button>
          <button type="button" class="pagamento-btn" onclick="selecionarPagamento('dinheiro', this)">
            <i class="ti ti-cash"></i> Dinheiro
          </button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-label">Produto</div>
      <div class="produtos">
        <button class="produto-btn" onclick="selecionarProduto('corn-dog-queijo', 12, this)">
          <div class="p-nome">Corn Dog</div>
          <div class="p-preco">R$ 12,00</div>
          <span class="p-tag tag-queijo">com queijo</span>
        </button>
        <button class="produto-btn" onclick="selecionarProduto('corn-dog-simples', 10, this)">
          <div class="p-nome">Corn Dog</div>
          <div class="p-preco">R$ 10,00</div>
          <span class="p-tag tag-semqueijo">sem queijo</span>
        </button>
        <button class="produto-btn" onclick="selecionarProduto('banana-frita', 8, this)">
          <div class="p-nome">Banana Frita</div>
          <div class="p-preco">R$ 8,00</div>
          <span class="p-tag tag-vegano">vegano</span>
        </button>
      </div>

      <div class="qty-row">
        <span class="qty-label">Quantidade</span>
        <div class="qty-controls">
          <button class="qty-btn" onclick="alterarQty(-1)">−</button>
          <span class="qty-val" id="qty-val">1</span>
          <button class="qty-btn" onclick="alterarQty(1)">+</button>
        </div>
      </div>

      <div class="total-row">
        <span class="total-label">Total</span>
        <span class="total-val" id="total-val">R$ —</span>
      </div>

      <button class="btn-primary" id="btn-registrar" onclick="registrarPedido()" disabled>
        <i class="ti ti-check"></i> Registrar pedido
      </button>
    </div>
  </div>

  <!-- COZINHA -->
  <div id="tab-cozinha" class="panel">
    <div class="filtro-wrap">
      <select id="filtro-status" onchange="renderCozinha()">
        <option value="todos">Todos os pedidos</option>
        <option value="aguardando">Aguardando</option>
        <option value="preparo">Em preparo</option>
        <option value="pronto">Prontos</option>
        <option value="entregue">Entregues</option>
      </select>
    </div>
    <div id="lista-pedidos"></div>
  </div>

  <!-- RELATÓRIO -->
  <div id="tab-relatorio" class="panel">
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Total pedidos</div>
        <div class="metric-val" id="m-total">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">Concluídos</div>
        <div class="metric-val" id="m-prontos">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">Faturamento</div>
        <div class="metric-val" id="m-fat">R$&nbsp;0</div>
      </div>
    </div>
    <div class="card">
      <div class="section-label">Vendas por produto</div>
      <div id="rel-produtos"></div>
    </div>
    <div class="card">
      <div class="section-label">Por forma de pagamento</div>
      <div id="rel-pagamentos"></div>
    </div>
    <div class="card">
      <div class="section-label">Por vendedor</div>
      <div id="rel-vendedores"></div>
    </div>
    <button class="btn-secondary" onclick="exportarCSV()">
      <i class="ti ti-download"></i> Exportar relatório (.csv)
    </button>
    <button class="btn-secondary" onclick="limparDados()" style="color:#c0392b; border-color:#f5c6c6; margin-top:6px;">
      <i class="ti ti-trash"></i> Limpar todos os pedidos
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const PRODUTOS = {
    'corn-dog-queijo':  { nome: 'Corn Dog (com queijo)', preco: 12 },
    'corn-dog-simples': { nome: 'Corn Dog (sem queijo)', preco: 10 },
    'banana-frita':     { nome: 'Banana Frita Empanada', preco: 8  }
  };

  const NOME_BARRACA = 'Liga de Data Science';

  let pedidos = JSON.parse(localStorage.getItem('pedidos_liga') || '[]');
  let produtoSelecionado = null;
  let precoSelecionado = 0;
  let qty = 1;
  let pagamentoSelecionado = null;
  let contador = pedidos.length > 0 ? Math.max(...pedidos.map(p => p.numero)) + 1 : 1;

  const PAGAMENTO_LABEL = { pix: 'Pix', dinheiro: 'Dinheiro', cartao: 'Cartão' };
  const PAGAMENTO_ICON  = { pix: 'ti-qrcode', dinheiro: 'ti-cash', cartao: 'ti-credit-card' };

  function showTab(t) {
    document.querySelectorAll('.tab').forEach((b, i) =>
      b.classList.toggle('active', ['caixa','cozinha','relatorio'][i] === t)
    );
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + t).classList.add('active');
    if (t === 'cozinha') renderCozinha();
    if (t === 'relatorio') renderRelatorio();
  }

  function selecionarProduto(p, preco, el) {
    document.querySelectorAll('.produto-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    produtoSelecionado = p;
    precoSelecionado = preco;
    atualizarTotal();
    validarForm();
  }

  function alterarQty(d) {
    qty = Math.max(1, qty + d);
    document.getElementById('qty-val').textContent = qty;
    atualizarTotal();
  }

  function atualizarTotal() {
    document.getElementById('total-val').textContent = produtoSelecionado
      ? 'R$ ' + (precoSelecionado * qty).toFixed(2).replace('.', ',')
      : 'R$ —';
  }

  function selecionarPagamento(p, el) {
    document.querySelectorAll('.pagamento-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    pagamentoSelecionado = p;
    validarForm();
  }

  function validarForm() {
    const nome = document.getElementById('cliente-nome').value.trim();
    const tel  = document.getElementById('cliente-tel').value.trim();
    document.getElementById('btn-registrar').disabled = !(nome && tel && produtoSelecionado && pagamentoSelecionado);
  }

  document.getElementById('cliente-nome').addEventListener('input', validarForm);
  document.getElementById('cliente-tel').addEventListener('input', validarForm);

  function registrarPedido() {
    const nome     = document.getElementById('cliente-nome').value.trim();
    const tel      = document.getElementById('cliente-tel').value.replace(/\D/g, '');
    const obs      = document.getElementById('cliente-obs').value.trim();
    const vendedor = document.getElementById('cliente-vendedor').value.trim();
    const pedido = {
      numero: contador++,
      nome, tel, obs, vendedor,
      produto: produtoSelecionado,
      qty,
      total: precoSelecionado * qty,
      pagamento: pagamentoSelecionado,
      status: 'aguardando',
      horario: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
    };
    pedidos.push(pedido);
    salvar();
    atualizarBadge();
    mostrarToast('Pedido #' + pedido.numero + ' registrado!');
    resetForm();
  }

  function resetForm() {
    document.getElementById('cliente-nome').value = '';
    document.getElementById('cliente-tel').value  = '';
    document.getElementById('cliente-obs').value  = '';
    document.querySelectorAll('.produto-btn').forEach(b => b.classList.remove('selected'));
    document.querySelectorAll('.pagamento-btn').forEach(b => b.classList.remove('selected'));
    produtoSelecionado = null;
    precoSelecionado = 0;
    pagamentoSelecionado = null;
    qty = 1;
    document.getElementById('qty-val').textContent  = '1';
    document.getElementById('total-val').textContent = 'R$ —';
    document.getElementById('btn-registrar').disabled = true;
    // vendedor is intentionally kept so the same cashier doesn't have to retype it each order
  }

  function renderCozinha() {
    const filtro   = document.getElementById('filtro-status').value;
    const lista    = document.getElementById('lista-pedidos');
    const filtrados = pedidos
      .filter(p => filtro === 'todos' || p.status === filtro)
      .sort((a, b) => b.numero - a.numero);

    if (!filtrados.length) {
      lista.innerHTML = `<div class="empty"><i class="ti ti-basket-off"></i>Nenhum pedido aqui ainda</div>`;
      return;
    }

    const labels = { aguardando: 'Aguardando', preparo: 'Em preparo', pronto: 'Pronto ✓', entregue: 'Entregue ✓' };

    lista.innerHTML = filtrados.map(p => `
      <div class="pedido-card">
        <div class="pedido-header">
          <div>
            <div class="pedido-nome">#${p.numero} · ${p.nome}</div>
            <div class="pedido-tel"><i class="ti ti-device-mobile" style="font-size:13px;"></i> ${p.tel}</div>
          </div>
          <span class="badge badge-${p.status}">${labels[p.status]}</span>
        </div>
        <div class="pedido-info">
          ${p.qty}x ${PRODUTOS[p.produto].nome} · <strong>R$ ${p.total.toFixed(2).replace('.',',')}</strong> · ${p.horario}
          ${p.pagamento ? `<span class="badge-pagamento"><i class="ti ${PAGAMENTO_ICON[p.pagamento]}" style="font-size:11px;"></i> ${PAGAMENTO_LABEL[p.pagamento]}</span>` : ''}
        </div>
        ${p.vendedor ? `<div class="pedido-obs"><i class="ti ti-user" style="font-size:12px;"></i> Vendedor: ${p.vendedor}</div>` : ''}
        ${p.obs ? `<div class="pedido-obs"><i class="ti ti-note" style="font-size:12px;"></i> ${p.obs}</div>` : ''}
        ${p.status !== 'entregue' ? `
        <div class="status-btns">
          ${p.status === 'aguardando'
            ? `<button class="status-btn preparo" onclick="mudarStatus(${p.numero},'preparo')">
                <i class="ti ti-flame"></i> Em preparo
               </button>`
            : ''}
          ${p.status !== 'pronto'
            ? `<button class="status-btn pronto" onclick="mudarStatus(${p.numero},'pronto')">
                <i class="ti ti-check"></i> Pronto
               </button>`
            : ''}
          ${p.status === 'pronto'
            ? `<button class="status-btn entregue" onclick="mudarStatus(${p.numero},'entregue')">
                <i class="ti ti-package-export"></i> Entregue
               </button>`
            : ''}
        </div>` : ''}
        ${p.msgEnviada ? `<div class="msg-enviada"><i class="ti ti-brand-whatsapp"></i> WhatsApp enviado</div>` : ''}
      </div>
    `).join('');
  }

  function mudarStatus(numero, novoStatus) {
    const p = pedidos.find(x => x.numero === numero);
    if (!p) return;
    p.status = novoStatus;
    p.msgEnviada = true;
    salvar();
    atualizarBadge();
    abrirWhatsApp(p, novoStatus);
    renderCozinha();
    const toastLabel = { preparo: 'em preparo', pronto: 'pronto', entregue: 'entregue' };
    mostrarToast('Pedido #' + numero + ' → ' + toastLabel[novoStatus]);
  }

  const WA_EMOJI = {
    milho:   String.fromCodePoint(0x1F33D),
    circo:   String.fromCodePoint(0x1F3AA),
    check:   String.fromCodePoint(0x2705),
    memo:    String.fromCodePoint(0x1F4DD)
  };

  function abrirWhatsApp(p, status) {
    const nomeProduto = PRODUTOS[p.produto].nome;
    const obs = p.obs ? '\n' + WA_EMOJI.memo + ' Obs: ' + p.obs : '';
    const msgs = {
      preparo: 'Ol\u00e1, ' + p.nome + '! ' + WA_EMOJI.milho + '\nSeu pedido #' + p.numero + ' (' + p.qty + 'x ' + nomeProduto + ') est\u00e1 sendo preparado com carinho.' + obs + '\nTe avisamos quando estiver prontinho! \u2014 ' + NOME_BARRACA + ' ' + WA_EMOJI.circo,
      pronto:  'Ol\u00e1, ' + p.nome + '! ' + WA_EMOJI.check + '\nSeu pedido #' + p.numero + ' (' + p.qty + 'x ' + nomeProduto + ') est\u00e1 *PRONTO*! Pode vir buscar na barraca.' + obs + '\n\u2014 ' + NOME_BARRACA + ' ' + WA_EMOJI.circo
    };
    if (!msgs[status]) return;
    const tel    = p.tel.replace(/\D/g, '');
    const telFmt = tel.length === 11 ? '55' + tel : tel;
    window.open('https://wa.me/' + telFmt + '?text=' + encodeURIComponent(msgs[status]), '_blank');
  }

  function renderRelatorio() {
    document.getElementById('m-total').textContent   = pedidos.length;
    document.getElementById('m-prontos').textContent = pedidos.filter(p => p.status === 'pronto' || p.status === 'entregue').length;
    const fat = pedidos.reduce((s, p) => s + p.total, 0);
    document.getElementById('m-fat').textContent = 'R$\u00a0' + fat.toFixed(2).replace('.', ',');

    const contagem = {};
    pedidos.forEach(p => {
      if (!contagem[p.produto]) contagem[p.produto] = { qty: 0, total: 0 };
      contagem[p.produto].qty   += p.qty;
      contagem[p.produto].total += p.total;
    });

    const el = document.getElementById('rel-produtos');
    if (!Object.keys(contagem).length) {
      el.innerHTML = '<p style="font-size:14px; color:#bbb; padding: 1rem 0;">Sem vendas ainda.</p>';
    } else {
      el.innerHTML = Object.entries(contagem).map(([prod, d]) => `
        <div class="rel-item">
          <span class="rel-item-nome">${PRODUTOS[prod].nome}</span>
          <span class="rel-item-val">${d.qty} unid · <strong>R$ ${d.total.toFixed(2).replace('.',',')}</strong></span>
        </div>
      `).join('');
    }

    const porPagamento = {};
    pedidos.forEach(p => {
      const key = p.pagamento || 'indefinido';
      if (!porPagamento[key]) porPagamento[key] = { qty: 0, total: 0 };
      porPagamento[key].qty   += p.qty;
      porPagamento[key].total += p.total;
    });

    const elPag = document.getElementById('rel-pagamentos');
    if (!Object.keys(porPagamento).length) {
      elPag.innerHTML = '<p style="font-size:14px; color:#bbb; padding: 1rem 0;">Sem vendas ainda.</p>';
      return;
    }
    const totalGeral = pedidos.reduce((s, p) => s + p.total, 0);
    const ordemPag = ['pix', 'dinheiro', 'cartao', 'indefinido'];
    const linhas = ordemPag.filter(k => porPagamento[k]).map(k => {
      const d = porPagamento[k];
      const pct = totalGeral > 0 ? Math.round((d.total / totalGeral) * 100) : 0;
      const label = PAGAMENTO_LABEL[k] || 'Indefinido';
      const icon  = PAGAMENTO_ICON[k]  || 'ti-circle';
      return `
        <div class="rel-item" style="flex-direction:column; align-items:stretch; gap:0;">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span class="rel-item-nome"><i class="ti ${icon}" style="font-size:13px; margin-right:5px; color:#888;"></i>${label}</span>
            <span class="rel-item-val">${d.qty} unid · <strong>R$ ${d.total.toFixed(2).replace('.',',')}</strong> <span style="color:#bbb;">(${pct}%)</span></span>
          </div>
          <div style="background:#f0f0ec; border-radius:99px; height:6px; margin-top:6px;">
            <div class="rel-pag-bar" style="width:${pct}%;"></div>
          </div>
        </div>
      `;
    });
    elPag.innerHTML = linhas.join('');

    const porVendedor = {};
    pedidos.forEach(p => {
      const key = p.vendedor && p.vendedor.trim() ? p.vendedor.trim() : '—';
      if (!porVendedor[key]) porVendedor[key] = { qty: 0, total: 0 };
      porVendedor[key].qty   += p.qty;
      porVendedor[key].total += p.total;
    });

    const elVend = document.getElementById('rel-vendedores');
    if (!Object.keys(porVendedor).length) {
      elVend.innerHTML = '<p style="font-size:14px; color:#bbb; padding: 1rem 0;">Sem vendas ainda.</p>';
    } else {
      elVend.innerHTML = Object.entries(porVendedor)
        .sort((a, b) => b[1].total - a[1].total)
        .map(([nome, d]) => `
          <div class="rel-item">
            <span class="rel-item-nome"><i class="ti ti-user" style="font-size:13px; margin-right:5px; color:#888;"></i>${nome}</span>
            <span class="rel-item-val">${d.qty} unid · <strong>R$ ${d.total.toFixed(2).replace('.',',')}</strong></span>
          </div>
        `).join('');
    }
  }

  function exportarCSV() {
    const header = 'Pedido,Nome,Telefone,Vendedor,Produto,Qtd,Total (R$),Pagamento,Horario,Status,Observacao';
    const rows = pedidos.map(p => [
      p.numero, p.nome, p.tel,
      p.vendedor || '',
      PRODUTOS[p.produto].nome,
      p.qty, p.total.toFixed(2),
      p.pagamento ? PAGAMENTO_LABEL[p.pagamento] : '',
      p.horario, p.status,
      p.obs || ''
    ].map(v => `"${v}"`).join(','));
    const csv  = [header, ...rows].join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = 'vendas_festa_junina.csv';
    a.click();
    mostrarToast('CSV exportado!');
  }

  function limparDados() {
    if (!confirm('Tem certeza? Todos os pedidos serão apagados.')) return;
    pedidos  = [];
    contador = 1;
    salvar();
    atualizarBadge();
    renderRelatorio();
    mostrarToast('Pedidos apagados.');
  }

  function salvar() {
    localStorage.setItem('pedidos_liga', JSON.stringify(pedidos));
  }

  function atualizarBadge() {
    const pendentes = pedidos.filter(p => p.status === 'aguardando' || p.status === 'preparo' || p.status === 'pronto').length;
    const badge = document.getElementById('badge-pendentes');
    if (pendentes > 0) {
      badge.textContent = pendentes;
      badge.style.display = 'inline-flex';
    } else {
      badge.style.display = 'none';
    }
  }

  function mostrarToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  atualizarBadge();
</script>

</body>
</html>
